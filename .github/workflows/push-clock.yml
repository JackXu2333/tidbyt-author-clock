name: Push Author Clock

on:
  workflow_dispatch:        # manual trigger only

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push to Tidbyt
        env:
          TIDBYT_API_TOKEN: ${{ secrets.TIDBYT_API_TOKEN }}
          TIDBYT_DEVICE_ID: ${{ secrets.TIDBYT_DEVICE_ID }}
        run: |
          KEY=$(TZ=America/New_York date +%H_%M)
          WEBP="renders/${KEY}.webp"

          # Fallback to 00_00 if file missing (shouldn't happen)
          [ -f "$WEBP" ] || WEBP="renders/00_00.webp"

          IMAGE_B64=$(base64 -w 0 "$WEBP")

          curl -sf -X POST \
            "https://api.tidbyt.com/v0/devices/${TIDBYT_DEVICE_ID}/push" \
            -H "Authorization: Bearer ${TIDBYT_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"image\": \"${IMAGE_B64}\", \"installationID\": \"authorclock\", \"background\": false}"
